name = "dnstt-worker"
main = "src/index.js"
compatibility_date = "2024-12-01"

[vars]
# The DNS domain used for the tunnel (e.g., "t.example.com")
DNSTT_DOMAIN = "t.example.com"

# Maximum DNS response payload size
DNSTT_MTU = "1232"

# Upstream address to forward tunnel streams to
# DNSTT_UPSTREAM = ""
